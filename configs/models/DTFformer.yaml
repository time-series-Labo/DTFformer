schema_version: 1
base_config: ../common.yaml
model: DTFformer

default_args:
  d_model: 512
  n_heads: 8
  e_layers: 2
  d_ff: 2048
  dropout: 0.1
  activation: gelu
  patch_len: 16
  stride: 8

architecture:
  temporal_branch: true
  frequency_branch: true
  mutual_guidance_attention: true
  dynamic_interaction: true
  adaptive_frequency_filter: true

provenance:
  source: manuscript_and_current_implementation
  private_dataset_policy: same_applicable_settings_as_DTFformer
