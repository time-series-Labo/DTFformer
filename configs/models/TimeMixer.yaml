schema_version: 1
base_config: ../common.yaml
model: TimeMixer

default_args:
  dropout: 0.1
  channel_independence: 1
  decomp_method: moving_avg
  moving_avg: 25
  use_norm: 1
  down_sampling_layers: 3
  down_sampling_window: 2
  down_sampling_method: avg

dataset_args:
  ETTh1:
    default_args: {d_model: 16, e_layers: 2, d_ff: 32}
  ETTh2:
    default_args: {d_model: 16, e_layers: 2, d_ff: 32}
  ETTm1:
    default_args: {d_model: 16, e_layers: 2, d_ff: 32}
  ETTm2:
    default_args: {d_model: 32, e_layers: 2, d_ff: 32}
  weather:
    default_args: {d_model: 16, e_layers: 3, d_ff: 32}
  wind1:
    default_args: {d_model: 512, e_layers: 2, d_ff: 2048}
  wind2:
    default_args: {d_model: 512, e_layers: 2, d_ff: 2048}

protocol_decisions:
  label_len: inherited_from_common_as_48
  training_budget: inherited_from_common

provenance:
  public_datasets: THUML_official_architecture_scripts
  wind1: private_dataset_common_protocol
  wind2: private_dataset_common_protocol
  official_repository: https://github.com/thuml/Time-Series-Library
